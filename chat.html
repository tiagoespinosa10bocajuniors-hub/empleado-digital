<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Probá tu mAIte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
  :root{--crema:#f4efe6;--papel:#fffdf8;--tinta:#23201b;--sub:#6f6657;--yerba:#2f5638;--yerba-cl:#3f7049;--mate:#c66b38;--linea:#e6ddcd;--bubble:#ece6da;--ok:#34c759}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Hanken Grotesk",system-ui,sans-serif;color:var(--tinta);background:var(--crema);height:100dvh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  header{flex:0 0 auto;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--papel);border-bottom:1px solid var(--linea)}
  .brand{font-family:"Fraunces";font-weight:600;font-size:24px;letter-spacing:-.5px;display:flex;align-items:center;gap:1px}
  .brand .ai{color:var(--yerba)} .brand .dot{width:6px;height:6px;border-radius:50%;background:var(--mate);margin:0 0 12px 3px}
  header .back{font-size:14px;color:var(--yerba);font-weight:600}
  .scroll{flex:1;overflow-y:auto;padding:28px 22px}
  .col{max-width:680px;margin:0 auto}
  .m{display:flex;gap:12px;margin-bottom:24px;align-items:flex-start}
  .m .av{flex:0 0 auto;width:30px;height:30px;border-radius:10px;background:var(--yerba);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-top:2px}
  .m .nm{font-size:12.5px;font-weight:600;color:var(--sub);margin-bottom:4px}
  .m .tx{font-size:16px;line-height:1.62;white-space:pre-wrap;word-wrap:break-word}
  .m.me{justify-content:flex-end}
  .m.me .tx{background:var(--bubble);border-radius:16px 16px 4px 16px;padding:11px 16px;max-width:80%}
  .dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#b9b09c;margin-right:4px;animation:b 1.1s infinite}
  .dots span:nth-child(2){animation-delay:.18s}.dots span:nth-child(3){animation-delay:.36s}
  @keyframes b{0%,60%,100%{opacity:.35;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  .comp{flex:0 0 auto;padding:14px 22px 20px;border-top:1px solid var(--linea);background:var(--crema)}
  .cbox{max-width:680px;margin:0 auto;display:flex;align-items:flex-end;gap:9px;background:var(--papel);border:1px solid var(--linea);border-radius:20px;padding:8px 8px 8px 17px;box-shadow:0 2px 12px -7px rgba(0,0,0,.15)}
  .cbox textarea{flex:1;border:none;outline:none;resize:none;font:inherit;font-size:16px;line-height:1.5;max-height:130px;background:transparent;color:var(--tinta);padding:7px 0}
  .send{flex:0 0 auto;width:38px;height:38px;border-radius:12px;background:var(--yerba);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:none}
  .send:hover{background:var(--yerba-cl)}
  .chips{max-width:680px;margin:10px auto 0;display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:13px;color:var(--sub);background:var(--papel);border:1px solid var(--linea);padding:7px 12px;border-radius:10px;cursor:pointer}
  .chip:hover{border-color:var(--yerba);color:var(--yerba)}
  .hint{text-align:center;color:#a89e8c;font-size:12px;margin-top:9px}
</style>
</head>
<body>
<header>
  <a class="brand" href="/">m<span class="ai">AI</span>te<span class="dot"></span></a>
  <a class="back" href="/panel">Mi panel</a>
</header>
<div class="scroll" id="scroll"><div class="col" id="col">
  <div class="m">
    <div class="av">m</div>
    <div><div class="nm">tu mAIte</div>
      <div class="tx">¡Hola! 🧉 Soy tu mAIte. Preguntame por un producto, un precio, o pedime que te anote un pedido. Probá:</div>
      <div style="margin-top:12px">
        <span class="chip" onclick="usar(this)">¿Tenés coca de 2 litros?</span>
        <span class="chip" onclick="usar(this)">¿Cuánto sale el fernet?</span>
        <span class="chip" onclick="usar(this)">Anotame 6 cocas y un fernet</span>
      </div>
    </div>
  </div>
</div></div>
<div class="comp">
  <div class="cbox">
    <textarea id="inp" rows="1" placeholder="Escribile a tu mAIte..."></textarea>
    <button class="send" onclick="enviar()">↑</button>
  </div>
  <div class="hint">Tu mAIte usa tu lista de productos. Enter para enviar.</div>
</div>
<script>
  var col=document.getElementById('col'),scroll=document.getElementById('scroll'),
      inp=document.getElementById('inp'),pensando=false,historial=[];
  function abajo(){scroll.scrollTop=scroll.scrollHeight}
  function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
  function fmt(t){return esc(t).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}
  function pintarUser(t){var d=document.createElement('div');d.className='m me';d.innerHTML='<div class="tx">'+esc(t)+'</div>';col.appendChild(d);abajo()}
  function pintarBot(t){var d=document.createElement('div');d.className='m';d.innerHTML='<div class="av">m</div><div><div class="nm">tu mAIte</div><div class="tx">'+fmt(t)+'</div></div>';col.appendChild(d);abajo()}
  function pintarTyping(){var d=document.createElement('div');d.className='m';d.id='typing';d.innerHTML='<div class="av">m</div><div><div class="nm">tu mAIte</div><div class="dots"><span></span><span></span><span></span></div></div>';col.appendChild(d);abajo()}
  function quitarTyping(){var t=document.getElementById('typing');if(t)t.remove()}
  function usar(el){inp.value=el.textContent;inp.focus();auto()}
  function auto(){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,130)+'px'}
  inp.addEventListener('input',auto);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar()}});
  function enviar(){
    var t=inp.value.trim(); if(!t||pensando)return;
    pintarUser(t); historial.push({rol:'user',texto:t}); inp.value='';auto();
    pensando=true; pintarTyping();
    fetch('/chat/enviar',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mensaje:t,historial:historial.slice(-8)})})
      .then(function(r){return r.json()})
      .then(function(d){quitarTyping();var resp=(d&&d.respuesta)?d.respuesta:'Perdón, no te entendí.';pintarBot(resp);historial.push({rol:'bot',texto:resp})})
      .catch(function(){quitarTyping();pintarBot('Uh, se me cayó la conexión. Probá de nuevo.')})
      .finally(function(){pensando=false;inp.focus()});
  }
  inp.focus();
</script>
</body>
</html>
